<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オークション</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white p-4 flex justify-between items-center">
  <div class="text-lg font-bold">オークション</div>
  <div class="text-sm">
    <span id="user"></span>
    <button onclick="logout()" class="ml-2 bg-white text-blue-600 px-3 py-1 rounded">
      ログアウト
    </button>
  </div>
</header>

<div class="p-4 max-w-4xl mx-auto">

  <!-- 管理者 -->
  <div id="adminArea" class="bg-white p-4 rounded-xl shadow mb-4 hidden">
    <h2 class="font-bold mb-2">商品登録</h2>

    <input id="itemName" placeholder="商品名"
      class="border p-2 w-full mb-2 rounded">

    <input id="startPrice" type="number" placeholder="開始価格"
      class="border p-2 w-full mb-2 rounded">

    <input id="bidUnit" type="number" placeholder="入札単位"
      class="border p-2 w-full mb-2 rounded">

    <!-- ★ 日時指定 -->
    <input id="deadline" type="datetime-local"
      class="border p-2 w-full mb-2 rounded">

    <button onclick="createItem()"
      class="bg-green-500 text-white w-full p-2 rounded">
      登録
    </button>
  </div>

  <div id="items" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  doc, updateDoc, deleteDoc, getDoc, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpd9FYMXGdJCBFXXTEHb2JkP6D9F0tp84",
  authDomain: "auction-be4d0.firebaseapp.com",
  projectId: "auction-be4d0",
  storageBucket: "auction-be4d0.firebasestorage.app",
  messagingSenderId: "911679639732",
  appId: "1:911679639732:web:bae509c92e069ce02e47e1",
  measurementId: "G-5B4GH2LDGQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isAdmin = false;

// ログインチェック
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  const userDoc = await getDoc(doc(db, "users", user.uid));
  isAdmin = userDoc.data().isAdmin === true;

  if (isAdmin) {
    document.getElementById("adminArea").classList.remove("hidden");
  }
});

// 表示名
document.getElementById("user").innerText =
  localStorage.getItem("name") + "（" + localStorage.getItem("xId") + "）";

// ログアウト
window.logout = () => {
  signOut(auth);
  location.href = "login.html";
};

// 商品登録
window.createItem = async () => {
  const name = itemName.value;
  const price = Number(startPrice.value);
  const unit = Number(bidUnit.value);
  const deadlineInput = new Date(document.getElementById("deadline").value).getTime();

  if (!name || !price || !unit || !deadlineInput) {
    alert("全部入力して");
    return;
  }

  await addDoc(collection(db, "items"), {
    name,
    currentPrice: price,
    bidder: "",
    bidUnit: unit,
    deadline: deadlineInput,
    bids: []
  });

  alert("登録完了");
};

// 商品表示
onSnapshot(collection(db, "items"), (snapshot) => {
  const itemsDiv = document.getElementById("items");
  itemsDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    const item = docSnap.data();
    const id = docSnap.id;

    const disabled = Date.now() > item.deadline;

    const history = (item.bids || []).slice().reverse().map(b =>
      `<div>¥${b.price} - ${b.user}</div>`
    ).join("");

    itemsDiv.innerHTML += `
    <div class="bg-white p-4 rounded-xl shadow">

      <h2 class="text-lg font-bold">${item.name}</h2>

      <p>現在価格: ¥${item.currentPrice}</p>
      <p class="text-sm">入札者: ${item.bidder || "なし"}</p>
      <p class="text-sm">単位: ¥${item.bidUnit}</p>

      <p>残り時間:
        <span id="time-${id}" data-deadline="${item.deadline}"></span>
      </p>

      <input id="price-${id}" type="number"
        class="border w-full mt-2 p-2"
        ${disabled ? "disabled" : ""}>

      <button onclick="bid('${id}', ${item.currentPrice}, ${item.bidUnit})"
        class="bg-blue-500 text-white w-full mt-2 p-2 rounded"
        ${disabled ? "disabled" : ""}>
        入札
      </button>

      ${isAdmin ? `
        <button onclick="deleteItem('${id}')"
          class="bg-red-500 text-white w-full mt-2 p-2 rounded">
          削除
        </button>
      ` : ""}

      <!-- ★ 入札履歴 -->
      <div class="mt-3">
        <div class="font-bold text-sm">履歴</div>
        <div class="text-sm max-h-32 overflow-y-auto">
          ${history || "なし"}
        </div>
      </div>

    </div>
    `;
  });
});

// 入札
window.bid = async (id, currentPrice, unit) => {
  const price = Number(document.getElementById("price-" + id).value);

  if (price <= currentPrice) {
    alert("現在価格より高く");
    return;
  }

  if ((price - currentPrice) % unit !== 0) {
    alert("単位が違います");
    return;
  }

  const user = localStorage.getItem("name") + "（" + localStorage.getItem("xId") + "）";

  await updateDoc(doc(db, "items", id), {
    currentPrice: price,
    bidder: user,
    bids: arrayUnion({
      price: price,
      user: user,
      time: Date.now()
    })
  });
};

// 削除
window.deleteItem = async (id) => {
  if (!confirm("削除する？")) return;
  await deleteDoc(doc(db, "items", id));
};

// 残り時間
setInterval(() => {
  document.querySelectorAll("[id^=time-]").forEach(el => {
    const deadline = Number(el.dataset.deadline);
    const diff = deadline - Date.now();

    if (diff <= 0) {
      el.innerText = "終了";
    } else {
      const s = Math.floor(diff / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      el.innerText = `${m}:${sec.toString().padStart(2, "0")}`;
    }
  });
}, 1000);
</script>

</body>
</html>
