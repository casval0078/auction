<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-80">

  <h1 class="text-xl font-bold mb-4 text-center">ログイン</h1>

  <div id="error" class="text-red-500 mb-2 text-sm"></div>

  <input id="name" placeholder="名前（新規登録時のみ）"
    class="border p-2 w-full mb-2 rounded">

  <input id="email" placeholder="メールアドレス"
    class="border p-2 w-full mb-2 rounded">

  <input id="password" type="password" placeholder="パスワード"
    class="border p-2 w-full mb-3 rounded">

  <button onclick="login()"
    class="bg-blue-500 text-white w-full p-2 rounded mb-2">
    ログイン
  </button>

  <button onclick="register()"
    class="bg-green-500 text-white w-full p-2 rounded">
    新規登録
  </button>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ここ",
  authDomain: "ここ",
  projectId: "ここ",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔵 ログイン
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.innerText = "";

  if (!email || !pass) {
    error.innerText = "メールとパスワードを入力して";
    return;
  }

  if (pass.length < 6) {
    error.innerText = "パスワードは6文字以上にしてください";
    return;
  }

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);

    const docSnap = await getDoc(doc(db, "users", cred.user.uid));
    localStorage.setItem("name", docSnap.data().name);

    location.href = "index.html";

  } catch (e) {
    if (e.code === "auth/user-not-found") {
      error.innerText = "ユーザーが存在しません";
    } else if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
      error.innerText = "パスワードが違います";
    } else {
      error.innerText = "ログイン失敗";
      console.error(e);
    }
  }
};

// 🟢 新規登録
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const name = document.getElementById("name").value;
  const error = document.getElementById("error");

  error.innerText = "";

  if (!name || !email || !pass) {
    error.innerText = "すべて入力してください";
    return;
  }

  if (pass.length < 6) {
    error.innerText = "パスワードは6文字以上にしてください";
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", cred.user.uid), {
      name: name,
      isAdmin: false
    });

    localStorage.setItem("name", name);

    location.href = "index.html";

  } catch (e) {
    if (e.code === "auth/email-already-in-use") {
      error.innerText = "このメールは既に登録されています";
    } else {
      error.innerText = "登録失敗";
      console.error(e);
    }
  }
};
</script>

</body>
</html>
