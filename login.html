<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン / 新規登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-80">

  <h1 class="text-xl font-bold mb-4 text-center">ログイン / 新規登録</h1>

  <div id="error" class="text-red-500 mb-2 text-sm"></div>

  <!-- 初回登録用 -->
  <input id="name" placeholder="名前（＝X表示名・初回のみ）"
    class="border p-2 w-full mb-2 rounded">

  <input id="xId" placeholder="XのID（@から・初回のみ）"
    class="border p-2 w-full mb-2 rounded">

  <!-- 共通 -->
  <input id="email" placeholder="メールアドレス"
    class="border p-2 w-full mb-2 rounded">

  <input id="password" type="password" placeholder="パスワード"
    class="border p-2 w-full mb-3 rounded">

  <button onclick="login()"
    class="bg-blue-500 text-white w-full p-2 rounded mb-2">
    ログイン
  </button>

  <button onclick="register()"
    class="bg-green-500 text-white w-full p-2 rounded">
    新規登録
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpd9FYMXGdJCBFXXTEHb2JkP6D9F0tp84",
  authDomain: "auction-be4d0.firebaseapp.com",
  projectId: "auction-be4d0",
  storageBucket: "auction-be4d0.firebasestorage.app",
  messagingSenderId: "911679639732",
  appId: "1:911679639732:web:bae509c92e069ce02e47e1",
  measurementId: "G-5B4GH2LDGQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔵 ログイン
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.innerText = "";

  if (!email || !pass) {
    error.innerText = "メールとパスワードを入力して";
    return;
  }

  if (pass.length < 6) {
    error.innerText = "パスワードは6文字以上にしてください";
    return;
  }

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);

    const userDoc = await getDoc(doc(db, "users", cred.user.uid));
    const userData = userDoc.data();

    // 名前だけ保持（表示用）
    localStorage.setItem("name", userData.name);

    location.href = "index.html";

  } catch (e) {
    if (e.code === "auth/user-not-found") {
      error.innerText = "ユーザーが存在しません";
    } else if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
      error.innerText = "パスワードが違います";
    } else {
      error.innerText = "ログイン失敗";
      console.error(e);
    }
  }
};

// 🟢 新規登録（初回のみ）
window.register = async () => {
  const name = document.getElementById("name").value;
  const xId = document.getElementById("xId").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.innerText = "";

  if (!name || !xId || !email || !pass) {
    error.innerText = "すべて入力してください";
    return;
  }

  if (!xId.startsWith("@")) {
    error.innerText = "XのIDは@から入力してください";
    return;
  }

  if (pass.length < 6) {
    error.innerText = "パスワードは6文字以上にしてください";
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", cred.user.uid), {
      name: name,   // ← X表示名
      xId: xId,
      isAdmin: false
    });

    localStorage.setItem("name", name);

    location.href = "index.html";

  } catch (e) {
    if (e.code === "auth/email-already-in-use") {
      error.innerText = "このメールは既に登録されています";
    } else {
      error.innerText = "登録失敗";
      console.error(e);
    }
  }
};
</script>

</body>
</html>
